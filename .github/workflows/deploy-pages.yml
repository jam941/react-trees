name: Deploy Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Build gallery at /react-trees/
      - run: pnpm --filter @internal/gallery build
        env:
          GALLERY_BASE: /react-trees/
      - run: mkdir -p _site
      - run: cp -r apps/gallery/dist/. _site/
      # SPA fallback: GitHub Pages serves 404.html for unknown paths,
      # so client-side routes survive a hard refresh.
      - run: cp _site/index.html _site/404.html

      # Build storybook at /react-trees/storybook/
      - run: pnpm --filter @internal/storybook build
        env:
          STORYBOOK_BASE: /react-trees/storybook/
      - run: mkdir -p _site/storybook
      - run: cp -r apps/storybook/storybook-static/. _site/storybook/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
