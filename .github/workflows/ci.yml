name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm -r lint
      - run: pnpm -r test
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    # Enabled once Playwright specs exist (Step 5+)
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @internal/gallery build
      - run: pnpx playwright install --with-deps chromium firefox webkit
      - run: pnpm test:e2e

  perf:
    runs-on: ubuntu-latest
    # Enabled once perf specs exist (Step 6+)
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @internal/gallery build
      - run: pnpx playwright install --with-deps chromium
      - run: pnpm test:perf

  a11y:
    runs-on: ubuntu-latest
    # Enabled once a11y specs exist (Step 11+)
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpx playwright install --with-deps chromium
      - run: pnpm test:a11y
